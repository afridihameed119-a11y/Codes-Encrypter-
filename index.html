                    .replace(/§APOS§/g, "'")
                    .replace(/§NL§/g, '\n')
                    .replace(/§CR§/g, '\r')
                    .replace(/§TAB§/g, '\t')
                    .replace(/§SP§/g, ' ');
                
                if ("html" === "html") {
                    document.open();
                    document.write(original);
                    document.close();
                } else {
                    document.body.innerHTML = '<pre style="color: #333; background: white; padding: 20px; white-space: pre-wrap; word-wrap: break-word; border-radius: 10px; max-width: 90%; max-height: 90%; overflow: auto;">' + original.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</pre>';
                }
            } catch (e) {
                document.body.innerHTML = '<div style="color: #ff4444; text-align: center; background: white; padding: 20px; border-radius: 10px;">DECRYPTION ERROR: ' + e.message + '</div>';
            }
        }
        
        window.onload = function() {
            setTimeout(decryptAndExecute, 1500);
        };
    </script>
